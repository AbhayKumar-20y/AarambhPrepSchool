<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aarambh Prep School Daily Class Worksheet</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<div class="container">

<h2>Aarambh Prep School Daily Class Worksheet</h2>
<!-- <p>Developed by A6h & Chatgpt</p> -->

<div class="card">
<select id="class">
    <option>Select Class</option>
    <option>Play</option>
    <option>L.K.G</option>
    <option>U.K.G</option>
    <option>1</option>
    <option>2</option>
    <option>3</option>
    <option>4</option>
    <option>5</option>
    <option>6</option>
    <option>7</option>
    <option>8</option>
    <option>Target Batch</option>
</select>

<!-- <input id="facilitator" placeholder="Facilitator Name"> -->
<select id="facilitator">
    <option>Select Teacher</option>
    <option>Abhay Sir</option>
    <option>Sundram Sir</option>
    <option>Himanshu Sir</option>
    <option>Miss Priya</option>
    <option>Puja Mam</option>
    <option>Soni Mam, Miss Priyanka</option>
</select>

<br>
<span id="daydate" style="font-weight:bold;"></span>

<input id="totalStudents" type="number" placeholder="Total Students">
<input id="presentStudents" type="number" placeholder="Present Students">

<input id="remarksInput" placeholder="Enter Remarks">

<h3>Select Table Style</h3>
<select id="styleSelect">
    <option value="style1">Purple</option>
    <option value="style2">Blue</option>
    <option value="style3">Green</option>
    <option value="style4">Black & White</option>
<option value="style5">Orange</option>
<option value="style6">Red</option>
<option value="style7">Pink</option>
<option value="style8">Teal</option>
<option value="style9">Dark Blue</option>
<option value="style10">Gray</option>
<option value="style11">Indigo</option>
<option value="style12">Lime</option>
<option value="style13">Brown</option>
<option value="style14">Cyan</option>

</select>
</div>

<div class="card">
<h3>Enter Period Data</h3>
<div id="inputs"></div>
</div>

<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Download Image</button>

<!-- OUTPUT -->
<div id="worksheet" class="style1">

    <div class="header">
        <h1>Aarambh Prep. School</h1>
        <h3>Class - <span id="outClass"></span> (Daily Class Work Sheet)</h3>
    </div>

    <div class="top-bar">
        <div>Class - <span id="outClass2"></span></div>
        <div>Facilitator - <span id="outFac"></span></div>
        <div>Date : <span id="outDate"></span></div>
        <div>Total: <span id="outTotal"></span></div>
        <div>Present: <span id="outPresent"></span></div>
        <div>Absent: <span id="outAbsent"></span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th rowspan="2">Period</th>
                <th rowspan="2">Subject</th>
                <th colspan="2" rowspan="2">Task Alloted</th>
                <th rowspan="2" class="remarks1">Remarks</th>
            </tr>
            <!-- <tr>
                <th>Type</th>
                <th>Work</th>
            </tr> -->
        </thead>
        <tbody id="tableData"></tbody>
    </table>
    
</div>

</div>
<script src="script.js"></script>
</body>
</html>
